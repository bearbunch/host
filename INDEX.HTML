<!DOCTYPE html>
<html>
<head>
<title>Theater Host</title>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<style>
.row {
  margin-bottom: 5px;
}

.seat {
  width: 30px;
  height: 30px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  margin: 2px;
  border-radius: 4px;
  font-size: 10px;
  color: white;
}

.free { background: green; }
.booked { background: red; }
</style>

</head>

<body>

<h2>Host Login</h2>

<div id="login">
  <input id="user" placeholder="username"><br><br>
  <input id="pass" type="password" placeholder="password"><br><br>
  <button onclick="login()">Login</button>
</div>

<div id="panel" style="display:none">

  <h3>Schedule Show</h3>

  <input id="name" placeholder="Show name"><br><br>
  <input id="date" type="date"><br><br>
  <input id="time" type="time"><br><br>

  <button onclick="schedule()">Create Show</button>

  <div id="menu" style="display:none">

    <h3>Seat Map</h3>
    <div id="seats"></div>

    <h3>Bookings</h3>
    <div id="list"></div>

    <button onclick="deleteShow()">Delete Listing</button>

  </div>

</div>

<script>

const backend = "https://YOURBACKEND.onrender.com";
const socket = io(backend);

/* =========================
   LOGIN (FIXED)
========================= */
function login() {
  const u = user.value;
  const p = pass.value;

  if (
    (u === "jwood" && p === "jwood") ||
    (u === "Belle woodward" && p === "Belle woodward")
  ) {
    document.getElementById("login").style.display = "none";
    document.getElementById("panel").style.display = "block";
  } else {
    alert("Wrong login");
  }
}

/* =========================
   CREATE SHOW
========================= */
function schedule() {
  fetch(backend + "/show", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      name: name.value,
      date: date.value,
      time: time.value
    })
  }).then(() => {
    document.getElementById("menu").style.display = "block";
    load();
  });
}

/* =========================
   LOAD DATA
========================= */
function load() {
  fetch(backend + "/show")
    .then(r => r.json())
    .then(data => {
      if (!data.show) return;
      drawSeats(data.seats);
      drawBookings(data.seats);
    });
}

/* =========================
   SEAT MAP (A–K / 1–11)
========================= */
function drawSeats(seats) {
  let rows = {};

  seats.forEach(s => {
    const letter = s.seat[0];
    if (!rows[letter]) rows[letter] = [];
    rows[letter].push(s);
  });

  let html = "";

  for (let r of "ABCDEFGHIJK") {
    if (!rows[r]) continue;

    html += `<div class="row"><b>${r}</b> `;

    rows[r].forEach(s => {
      html += `<div class="seat ${s.booked ? "booked" : "free"}">${s.seat}</div>`;
    });

    html += "</div>";
  }

  document.getElementById("seats").innerHTML = html;
}

/* =========================
   BOOKINGS LIST
========================= */
function drawBookings(seats) {
  let html = "";

  seats.filter(s => s.booked).forEach(s => {
    html += `Seat ${s.seat} - ${s.name}<br>`;
  });

  document.getElementById("list").innerHTML = html;
}

/* =========================
   DELETE SHOW
========================= */
function deleteShow() {
  fetch(backend + "/show", { method: "DELETE" })
    .then(() => location.reload());
}

/* =========================
   LIVE UPDATES
========================= */
socket.on("seatBooked", load);
socket.on("showCreated", load);
socket.on("showDeleted", () => location.reload());

load();

</script>

</body>
</html>
